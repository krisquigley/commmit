version: '3'
services:
  postgres:
    image: postgres:10.5-alpine
    ports:
      - '5432'

  redis: 
    image: redis:alpine
    ports:
      - '6379'

  web:
    build: .
    image: sprintable
    command: bash -c "rm -f /myapp/tmp/pids/server.pid && bundle install && bundle exec rails s -p 3000 -b 0.0.0.0"
    environment: &default_environment
      DATABASE_URL: 'postgres://postgres:@postgres:5432'
      BUNDLE_PATH: '/gems'
      BUNDLE_APP_CONFIG: /gems/.bundle
      REDIS_URL: 'redis://redis:6379'
      DATABASE_CLEANER_ALLOW_REMOTE_DATABASE_URL: 'true'
      WEBPACKER_DEV_SERVER_HOST: webpack
      USERNAME: 'username'
      PASSWORD: 'password'
    volumes:
      - ./:/myapp
      - gem-cache:/gems
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  webpack:
    image: sprintable
    command: bash -c "bin/webpack-dev-server"
    environment: 
      WEBPACKER_DEV_SERVER_HOST: 0.0.0.0
    volumes:
      - ./:/myapp
      - gem-cache:/gems
    ports: 
      - "3035:3035"
    depends_on:
      - web
      - postgres
      - redis

  worker:
    image: sprintable
    command: bundle exec sidekiq -c 5 -q critical -q default
    volumes:
      - ./:/myapp
      - gem-cache:/gems
    environment:
      <<: *default_environment
    depends_on:
      - redis
      - postgres
      - web

volumes:
  gem-cache: